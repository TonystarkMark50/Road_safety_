<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session Expired — AccelerateZero</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    .error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden}
    .error-bg{position:absolute;inset:0;background:radial-gradient(ellipse 40% 30% at 50% 40%,rgba(245,158,11,0.06) 0%,transparent 70%);pointer-events:none}
    .error-box{position:relative;text-align:center;max-width:480px;z-index:1}
    .error-icon{width:64px;height:64px;border-radius:16px;background:rgba(245,158,11,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--amber);font-size:1.5rem}
    .error-title{font-size:1.25rem;font-weight:700;margin-bottom:8px}
    .error-desc{color:var(--text-dim);font-size:0.9375rem;line-height:1.6;margin-bottom:28px}
    .error-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  </style>
</head>
<body>
  <div id="particles-canvas"></div>
  <div class="error-page">
    <div class="error-bg"></div>
    <div class="error-box">
      <div class="error-icon"><i class="fas fa-clock"></i></div>
      <h1 class="error-title">Session Expired</h1>
      <p class="error-desc">Your session has expired. Please sign in again to continue using the platform.</p>
      <div class="error-actions">
        <a href="/pages/login.html" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Sign In</a>
        <a href="/" class="btn btn-secondary"><i class="fas fa-home"></i> Go Home</a>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/router.js"></script>
  <script src="../scripts/http.js"></script>
  <script src="../scripts/ui.js"></script>
  <script src="../scripts/navigation.js"></script>
</body>
</html>
