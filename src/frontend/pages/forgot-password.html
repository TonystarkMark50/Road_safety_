<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — AccelerateZero</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div id="particles-canvas"></div>
  <div class="auth">
    <div class="auth-bg"></div>
    <div class="auth-box">
      <div class="auth-head">
        <div class="marker"><i class="fas fa-key"></i></div>
        <h1>Reset password</h1>
        <p>Enter your email and we'll send you recovery instructions</p>
      </div>
      <div class="auth-card">
        <form id="reset-form" style="display:flex;flex-direction:column;gap:16px">
          <div class="field">
            <label class="field-label" for="email">Email</label>
            <div class="field-icon">
              <i class="fas fa-envelope ico"></i>
              <input type="email" id="email" class="field-input" placeholder="you@example.com" required autocomplete="email" />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-full" style="justify-content:center">Send Instructions</button>
        </form>
        <div class="auth-footer">
          Remember your password? <a href="login.html">Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" style="position:fixed;top:72px;right:24px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none"></div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../scripts/auth.js">
  <script src="../scripts/router.js"></script>
  <script src="../scripts/http.js"></script>
  <script src="../scripts/ui.js"></script>
  <script src="../scripts/navigation.js"></script>
  <script src="../scripts/app.js"></script>
  <script src="../scripts/chatbot.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('reset-form');
      if (!form) return;
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email')?.value.trim();
        if (!email) { showError('Please enter your email'); return; }
        try {
          const res = await fetch('/api/v1/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || 'Reset request failed');
          }
          showSuccess('Recovery instructions sent to ' + email);
          setTimeout(() => { window.location.href = 'login.html'; }, 3000);
        } catch (err) {
          showError(err.message);
        }
      });
    });
  </script>
</body>
</html>
